name: Coolify Microservices CI/CD

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Common Module
        run: cd backend && mvn clean install -pl common -am -DskipTests

      - name: Build & Push Eureka
        run: cd backend && mvn compile jib:build -pl eureka-server -Dimage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-eureka:latest

      - name: Build & Push Gateway
        run: cd backend && mvn compile jib:build -pl api-gateway -Dimage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gateway:latest

      - name: Build & Push Auth
        run: cd backend && mvn compile jib:build -pl auth-service -Dimage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-auth:latest

      - name: Build & Push Product
        run: cd backend && mvn compile jib:build -pl product-service -Dimage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-product:latest

      - name: Build & Push Order
        run: cd backend && mvn compile jib:build -pl order-service -Dimage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-order:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build & Push Docker image
        run: |
          cd frontend
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest

  deploy-to-coolify:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Webhooks
        run: |
          # The || true ensures that if one webhook fails (e.g. not set up yet), it continues to the next
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_EUREKA }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_GATEWAY }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_AUTH }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_PRODUCT }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_ORDER }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_FRONTEND }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
